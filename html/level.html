<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Fields Of Crystil</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body class="level">
    <!-- Top-left game menu button -->
    <button id="game-menu-button" class="game-menu-button">
        ☰
    </button>
    <!-- Game menu modal -->
    <div id="game-menu-modal" class="game-menu-modal hidden">
        <div class="game-menu-backdrop"></div>
        <div class="game-menu-content">
            <h2>Game Menu</h2>
            <button id="menu-settings-btn">Settings</button>
            <button id="menu-restart-btn">Restart Level</button>
            <button id="menu-main-menu-btn">Main Menu</button>
            <button id="menu-close-btn" class="menu-close">Close</button>
        </div>
    </div>

    <!-- Settings modal (empty for now) -->
    <div id="settings-modal" class="game-menu-modal hidden">
        <div class="game-menu-backdrop"></div>
        <div class="game-menu-content">
            <h2>Settings</h2>
            <p>Settings coming soon.</p>
            <button id="settings-close-btn" class="menu-close">Close</button>
        </div>
    </div>

    <div id="resource-hud">
    <!-- Scraps -->
    <div class="hud-row">
        <span class="hud-icon" id="scraps-icon">●</span>
        <span class="hud-label" id="scraps-label">Scraps:</span>
        <span class="hud-value" id="scraps-amount">0</span>
    </div>

    <!-- Olives (placeholder) -->
    <div class="hud-row">
        <span class="hud-icon" id="olives-icon">●</span>
        <span class="hud-label" id="olives-label">Olives:</span>
        <span class="hud-value" id="olives-amount">0</span>
    </div>

    <!-- Prisms (placeholder) -->
    <div class="hud-row">
        <span class="hud-icon" id="prisms-icon">●</span>
        <span class="hud-label" id="prisms-label">Prisms:</span>
        <span class="hud-value" id="prisms-amount">0</span>
    </div>

    <!-- Population -->
    <div class="hud-row">
        <span class="hud-icon" id="pop-icon">👥</span>
        <span class="hud-label" id="pop-label">Population:</span>
        <span class="hud-value" id="pop-amount">0</span>
        <span class="hud-value">/</span>
        <span class="hud-value" id="pop-cap">0</span>
    </div>
    </div>
    <div class="game-wrapper">
        <canvas id="gameCanvas" width="1100" height="650"></canvas>

    <div id="ui-panel">
    <div id="building-ui" class="ui-section hidden">
        <!-- Build Barracks -->
        <button id="build-barracks-btn" class="hidden">
        Build Barracks
        </button>

        <!-- Train Melee -->
        <button id="train-melee-btn" class="hidden">
        Train Melee
        </button>

        <!-- Train Ranged -->
        <button id="train-ranged-btn" class="hidden">
        Train Ranged
        </button>

        <div id="train-progress" class="progress hidden">
        <div id="train-progress-fill"></div>
        </div>
        <div id="train-info">
        <span id="train-time-label"></span>
        </div>
    </div>
    </div>
        </div>
    </div>

    <script type="module" src="../js/main.js"></script>
</body>
</html>
