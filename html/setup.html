<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Setup – Mercenaries Of Armolga</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body class="setup-page">
  <div class="setup-container">
    <h1>Game Setup</h1>
    <p>Select your faction and opponents before the battle begins.</p>

    <!-- Faction selection -->
    <div class="setup-section">
      <h2>Faction</h2>
      <div class="faction-grid">
        <!-- Malachordith: disabled for now, first -->
        <div class="faction-card disabled" data-faction="Malachordith" id="faction-malachordith">
          <h3>Malachordith</h3>
          <p>Coming soon.</p>
        </div>

        <!-- Foldari: enabled, middle -->
        <div class="faction-card" data-faction="Foldari" id="faction-foldari">
          <h3>Foldari</h3>
          <p>Hardened mercenaries. Reliable fronts, solid economy.</p>
        </div>

        <!-- Shiervale: disabled, last -->
        <div class="faction-card disabled" data-faction="Shiervale" id="faction-shiervale">
          <h3>Shiervale</h3>
          <p>Coming soon.</p>
        </div>
      </div>
    </div>

    <!-- AI enemies selection -->
    <div class="setup-section">
      <h2>Opponents</h2>
      <div class="setup-row">
        <label for="ai-count">AI Enemies:</label>
        <select id="ai-count">
          <option value="1" selected>1</option>
          <option value="2" disabled>2 (coming soon)</option>
          <option value="3" disabled>3 (coming soon)</option>
        </select>
      </div>
    </div>

    <!-- Map selection -->
    <div class="setup-section">
      <h2>Map</h2>
      <div class="setup-row">
        <span id="selected-map-label">Current Map: Map 1 – Copper Fields</span>
        <button id="choose-map-btn" type="button">Choose Map…</button>
      </div>
    </div>

    <!-- Start button -->
    <div class="setup-footer">
      <button id="start-game-btn" disabled>Start Battle</button>
    </div>
  </div>

  <!-- Map selection modal -->
  <div id="map-modal-overlay" class="map-modal-overlay" hidden>
    <div class="map-modal">
      <div class="map-modal-header">
        <h2>Choose a Map</h2>
        <button id="map-modal-close" type="button" aria-label="Close map selection">×</button>
      </div>
      <div class="map-modal-body">
        <div class="map-grid">
          <!-- Map 1: real map -->
          <button class="map-card" data-map-id="map1">
            <div class="map-thumb"></div>
            <h3>Fields Of Crystil</h3>
            <p>Open fields and corner bases. 1v1 starts in the far corners from one another, with farmer quests about the center.</p>
          </button>

          <!-- Placeholders -->
          <button class="map-card disabled" data-map-id="map2" disabled>
            <div class="map-thumb"></div>
            <h3>Institution Of Prismworth</h3>
            <p>Four valley bases, with immediate access to surrounding swampland. Control of the center provides ample quests and trade opportunities.</p>
          </button>

          <button class="map-card disabled" data-map-id="map3" disabled>
            <div class="map-thumb"></div>
            <h3>Meeklan Shores</h3>
            <p>Deep forested shore, with hidden quests and chokepoints, scattered spawn points. Across the waters, islands and rare quests await.</p>
          </button>

          <button class="map-card disabled" data-map-id="map4" disabled>
            <div class="map-thumb"></div>
            <h3>Kord Canyons</h3>
            <p>Team map; each team shares an open starting area, divided from the enemy team by a trio of canyons. Control of the canyons is essential.</p>
          </button>

          <button class="map-card disabled" data-map-id="map5" disabled>
            <div class="map-thumb"></div>
            <h3>Map 5 – Coming Soon</h3>
            <p>Placeholder for a future battlefield.</p>
          </button>

          <button class="map-card disabled" data-map-id="map6" disabled>
            <div class="map-thumb"></div>
            <h3>Map 6 – Coming Soon</h3>
            <p>Placeholder for a future battlefield.</p>
          </button>
        </div>
      </div>
      <div class="map-modal-footer">
        <button id="map-modal-cancel" type="button">Close</button>
      </div>
    </div>
  </div>

  <script src="../js/setup.js"></script>
  
</body>
</html>
